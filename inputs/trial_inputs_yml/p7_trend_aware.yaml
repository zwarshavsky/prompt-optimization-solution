# P7: Trend-Aware — lean instructions + full score/parser-size trajectory shown to Gemini.
# Hypothesis: giving Gemini visibility into the performance trend (composite score,
# parser char count, per-question flip history) lets it make smarter, data-driven edits.

configuration:
  salesforce:
    username: "zwarshavsky+ritehitesdo@salesforce.com"
    password: "YOUR_PASSWORD"
    instanceUrl: "https://jamespark-250401-251-demo.my.salesforce.com"

  projectName: "RiteHite_Opt_P7"

  takeScreenshots: false
  headless: true
  slowMo: 0
  geminiModel: "gemini-3-pro-preview"
  pdfDirectory: "/Users/zwarshavsky/Documents/Custom_LWC_Org_SDO/Custom LWC Development SDO/prompt-optimization-solution/inputs/pdf/RiteHite"

  promptTemplateApiName: "RiteHite_Opt_P7"
  promptInputs:
    - apiName: "Input:Product"
      displayName: "Product"
    - apiName: "Input:Question"
      displayName: "Question"

  indexPrefix: "Opt_P7"
  searchIndexId: "18lKc000000oMyjIAE"
  refinementStage: "llm_parser"
  maxCycles: 5

  refinementStages:
    llm_parser:
      description: "LLM Parser Prompt Optimization"
      focus: |
        **CRITICAL**: Your primary task is to optimize the **LLM Parser Prompt**. This is the FIRST and MOST IMPORTANT component to optimize.
        We will iterate on the parser multiple times, reindex the documents, and test again until we achieve maximum improvement.
      rootCauseGuidance: |
        **ROOT CAUSE ANALYSIS REQUIREMENTS** (for each FAIL or PARTIAL):
        1. **Word-by-Word Comparison**: Compare generated vs expected answer.
        2. **Pipeline Failure Point**: Parser Failure, Chunking Failure, Relationship Failure, Context Preservation Failure, or Response Template Issue.
        3. **PDF Location Reference**: Page, section, quote.
        4. **For PASS cases**: What parser instruction worked correctly.
      modificationGuidance: |
        **PROMPT MODIFICATION REQUIREMENTS**:
        1. **Specific Prompt Text Changes**: Provide EXACT text changes.
        2. **Link to Root Cause**: Each modification MUST address a specific root cause.
        3. **Complete Updated Prompt**: Provide the COMPLETE updated LLM parser prompt text.
        4. **Trend-Informed Decisions**: Use the PERFORMANCE TRAJECTORY data below to guide your strategy — if scores are declining, reverse recent changes; if parser is growing but scores are flat, simplify.
    response_prompt:
      description: "Response Prompt Template Optimization"
      focus: |
        **CRITICAL**: The LLM Parser Prompt has been optimized to its maximum potential. Optimize the **Response Prompt Template**.
      rootCauseGuidance: |
        - **PRIMARY**: Is the response prompt template unclear?
        - **IGNORE**: Retrieval issues (not actionable)
      modificationGuidance: |
        - Provide SPECIFIC, ACTIONABLE improvements to the **Response Prompt Template**

  prompt_builder_models:
    primary: "sfdc_ai__DefaultOpenAIGPT5"
    fallbacks: []

  geminiInstructions: |
    # CUSTOM INSTRUCTIONS
    {{CUSTOM_INSTRUCTIONS}}
    ---
    # ITERATIVE REFINEMENT PROCESS
    This is an **iterative refinement process**. Each cycle involves:
    1. Analyzing test results
    2. Identifying optimization opportunities
    3. Proposing improved prompts
    4. Testing the improvements
    5. Repeating until optimal
    **Current Refinement Stage**: {{REFINEMENT_STAGE}}
    # PRIMARY FOCUS: {{REFINEMENT_STAGE_DESCRIPTION}}
    {{REFINEMENT_STAGE_FOCUS}}
    You will receive **one scoring/analysis request per cycle**.
    # PERFORMANCE TRAJECTORY (use this to guide your strategy)
    Below is the full history of this pipeline's optimization run. Use it to make data-driven decisions.
    ```
    {{SCORE_TRAJECTORY}}
    ```
    **How to use this data**:
    - If composite score is declining → your recent changes hurt. Revert the last modification and try a different approach.
    - If parser size is growing but score is flat → you are adding bloat with no benefit. Simplify.
    - If a question flipped from PASS to FAIL → identify what changed in the parser and undo that specific change.
    - If a question has been FAIL across all cycles → it may require a fundamentally different approach (new section, not a tweak).
    - If score is improving → continue the current strategy, make incremental additions.
    # TOKEN BUDGET
    Use the full context window for thorough analysis.
    # CONTEXT: RAG System Architecture
    You are analyzing a **Retrieval-Augmented Generation (RAG) system** built on Salesforce Data Cloud:
    1. **LLM Parser Prompt**: Breaks documents into semantic chunks.
    2. **Retriever**: Searches indexed chunks. **Not actionable/changeable.**
    3. **Response Prompt Template**: Synthesizes answers from retrieved chunks.
    # SOURCE DOCUMENT (PDF)
    The PDF is uploaded above. This contains the correct answers.
    # LLM PARSER PROMPT (CURRENT VERSION - PRIMARY FOCUS)
    {{LLM_PARSER_PROMPT}}
    # RESPONSE PROMPT TEMPLATE (for reference only)
    **Current Model**: {{RESPONSE_MODEL}}
    **Available Models**: {{AVAILABLE_MODELS}}
    **Content**: {{RESPONSE_PROMPT_TEMPLATE}}
    # TEST RESULTS
    {{WORKSHEET_TEXT}}
    # PREVIOUS CYCLE CONTEXT (if applicable)
    Use previous results to identify regressions, persistent failures, and improvements.
    # YOUR TASK: {{REFINEMENT_STAGE_TASK}}
    ## STEP 1: SCORE EACH RESPONSE (do this FIRST)
    Scoring measures RETRIEVAL EFFECTIVENESS.
    Decision tree:
    1. Response says "I don't have" / "unable to" / "cannot provide"?  → ❌ FAIL
    2. Response is about the wrong product entirely?  → ❌ FAIL
    3. Response provides the EXACT correct values?  → ✅ PASS
    4. Substantive technical content, right topic, wrong/imprecise values?  → 🔶 PARTIAL
    Only ❌ FAIL for: explicit refusal or totally irrelevant content.
    Apply consistently every cycle.
    ## STEP 2: ROOT CAUSE ANALYSIS
    2a. **Safety Score** (1-10)
    2b. **Root Cause/Explanation**: {{ROOT_CAUSE_GUIDANCE}}
    ## STEP 3: PROMPT MODIFICATIONS
    {{MODIFICATION_GUIDANCE}}
    # OUTPUT FORMAT
    Return ONLY a JSON array (one object per row), followed by a separate JSON object with the proposed prompt:
    [
      {
        "Pass/Fail": "✅ PASS" or "🔶 PARTIAL" or "❌ FAIL",
        "Safety Score": 1-10,
        "Root Cause/Explanation": "...",
        "Prompt Modification Next Version": "..."
      },
      ...
    ]
    {{OUTPUT_FORMAT_SECTION}}
    **IMPORTANT**:
    - Include "StageStatus" and "StageCompleteReason" in the proposed prompt object.
    - Keep scoring consistent across cycles.
    {{OUTPUT_FORMAT_IMPORTANT}}
    Return ONLY the JSON array, no other text.

questions:
  - number: "Q1"
    inputs:
      Input:Product: "TrakLine Door"
      Input:Question: "On a Trackline door, the black wire from the upper photo-eye receiver connects to what terminal?"
    expectedAnswer: "It connects to terminal X11."
  - number: "Q2"
    inputs:
      Input:Product: "Falcon Sensor (FasTrax/TrakLine)"
      Input:Question: "On a falcon, where does the yellow wire connect?"
    expectedAnswer: "It connects to Terminal 5, which is designated as \"NOT USED\"."
  - number: "Q3"
    inputs:
      Input:Product: "i-COMM / Door-Commander"
      Input:Question: "On a i-comm, what is the input setting for partial open toggle?"
    expectedAnswer: "The input setting is 11."
  - number: "Q4"
    inputs:
      Input:Product: "FasTrax Door"
      Input:Question: "Fastrax door is slamming closed, what are the causes?"
    expectedAnswer: "Causes include improperly set open/close limits, loose encoder components, incorrect phasing, incorrect gearbox ratio, or a released brake."
  - number: "Q5"
    inputs:
      Input:Product: "Multiple Products (i-COMM / FasTrax)"
      Input:Question: "What is the part number for a 60W power supply?"
    expectedAnswer: "The part number is 65700012."
  - number: "Q6"
    inputs:
      Input:Product: "Dock Levelers (HD-3100 / RHH-4000)"
      Input:Question: "What is the torque on a safe-t-lip bolt with 1\" bar?"
    expectedAnswer: "The torque range is 185 - 200 Ft-Lbs."
  - number: "Q7"
    inputs:
      Input:Product: "STR-4200 Dok-Lok / Dok-Commander"
      Input:Question: "Where do I connect a door interlock switch on a STR?"
    expectedAnswer: "Connect it to terminal J14.2 for the overhead door open interlock, or J14.3 for the leveler stored interlock."
  - number: "Q8"
    inputs:
      Input:Product: "STR-4200 Dok-Lok"
      Input:Question: "Black wire on solenoid 3 on a STR connects to what?"
    expectedAnswer: "Terminal J15.1."
  - number: "Q9"
    inputs:
      Input:Product: "Dok-Commander (STR-4200 / GWL-2300)"
      Input:Question: "What LED tells me if the motor overload is in fault?"
    expectedAnswer: "The Amber LED LD50 will illuminate."
  - number: "Q10"
    inputs:
      Input:Product: "RHV-4100 Vertical Leveler"
      Input:Question: "What is the tilt back setting on a vertical leveler?"
    expectedAnswer: "The tilt back setting is 2-1/2\" ± 1/2\"."
  - number: "Q11"
    inputs:
      Input:Product: "RHV-4100 Vertical Leveler"
      Input:Question: "What valve to adjust on RHV if leveler is drifting down?"
    expectedAnswer: "Adjust the counterbalance (\"CB\") valve."
  - number: "Q12"
    inputs:
      Input:Product: "RHR Dok-Lok"
      Input:Question: "Part number for wiring harness on RHR?"
    expectedAnswer: "The wiring harness is 105460 and the control harness is 18205."
  - number: "Q13"
    inputs:
      Input:Product: "RHR Dok-Lok"
      Input:Question: "Why is horn on restraint is double beeping?"
    expectedAnswer: "It indicates a limit switch fault or that the hook did not reach the correct position."
  - number: "Q14"
    inputs:
      Input:Product: "GWL-2300 Vehicle Restraint"
      Input:Question: "What hydraulic fluid goes in the GWL?"
    expectedAnswer: "The GWL uses MIL-H-5606 hydraulic fluid."
  - number: "Q15"
    inputs:
      Input:Product: "GWL-2300 Vehicle Restraint"
      Input:Question: "On a GWL is SW1 normally open or normally closed?"
    expectedAnswer: "SW1 is a normally open switch."
